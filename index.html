<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 Masters Auction Pool</title>
  <style>
    :root {
      --green: #123524;
      --gold: #c9a227;
      --bg: #f7f7f2;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --danger: #b91c1c;
      --success: #166534;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }
    h1 { margin: 0 0 8px; color: var(--green); }
    .subtitle { margin: 0 0 20px; color: var(--muted); }
    .topbar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
    .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; }
    .stat-value { font-size: 24px; font-weight: 700; margin-top: 6px; }
    .layout { display: grid; grid-template-columns: 1.8fr 1fr; gap: 20px; align-items: start; }
    .panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
    .golfers { max-height: 650px; overflow: auto; border: 1px solid var(--border); border-radius: 10px; }
    .golfer-row { display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: center; padding: 12px 14px; border-bottom: 1px solid #ececec; }
    button { background: var(--green); color: white; border: none; border-radius: 8px; padding: 10px 14px; cursor: pointer; font-weight: 600; }
    button.remove { background: #ef4444; }
    .picked-item { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: center; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; }
    .input-group { margin-bottom: 12px; }
    input[type="text"], input[type="email"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); font-size: 14px; }
    .rules { font-size: 14px; color: var(--muted); background: #fdfdfd; padding: 10px; border-radius: 8px; border: 1px dashed var(--border); margin-top: 10px;}
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .topbar { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>2026 Masters Auction Pool</h1>
    <p class="subtitle">Pick 4-8 golfers. Budget: $100. Top 4 scores count.</p>
    <div class="topbar">
      <div class="stat"><div class="stat-label">Budget</div><div class="stat-value">$100</div></div>
      <div class="stat"><div class="stat-label">Spent</div><div class="stat-value" id="spentValue">$0</div></div>
      <div class="stat"><div class="stat-label">Remaining</div><div class="stat-value" id="remainingValue">$100</div></div>
      <div class="stat"><div class="stat-label">Picked</div><div class="stat-value" id="pickedCount">0</div></div>
    </div>
    <div class="layout">
      <div class="panel">
        <input type="text" id="searchInput" placeholder="Search the field..." style="margin-bottom:14px;" />
        <div class="golfers" id="golfersList"></div>
      </div>
      <div class="panel">
        <h2 style="margin:0 0 14px; color: var(--green);">Your Entry</h2>
        <div class="input-group"><input type="text" id="entryName" placeholder="Your full name"/></div>
        <div class="input-group"><input type="email" id="entryEmail" placeholder="Email address"/></div>
        <div id="pickedList"></div>
        <div class="rules">
          <strong>Rules:</strong><br>
          • Pick 4 to 8 players<br>
          • Stay under $100 total<br>
          • Minimum salary is <strong>$4</strong>
        </div>
        <p id="message" style="margin:10px 0; font-weight: 600;"></p>
        <button id="submitBtn" style="width:100%;">Submit Entry</button>
      </div>
    </div>
  </div>

  <script>
    const BUDGET = 100;
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxpyZZhkbYb4TUBSqql2qpC7_xxazdrXAVtOCvk0Al8sfcFjAwb99M2qQA41_w6touA/exec";

    const golfers = [
      {name: "Scottie Scheffler", salary: 48}, {name: "Jon Rahm", salary: 40}, {name: "Bryson DeChambeau", salary: 36}, 
      {name: "Rory McIlroy", salary: 34}, {name: "Ludvig Åberg", salary: 30}, {name: "Xander Schauffele", salary: 28}, 
      {name: "Tommy Fleetwood", salary: 25}, {name: "Cameron Young", salary: 25}, {name: "Matt Fitzpatrick", salary: 24}, 
      {name: "Hideki Matsuyama", salary: 22}, {name: "Collin Morikawa", salary: 21}, {name: "Robert MacIntyre", salary: 20}, 
      {name: "Justin Rose", salary: 20}, {name: "Min Woo Lee", salary: 18}, {name: "Brooks Koepka", salary: 17}, 
      {name: "Jordan Spieth", salary: 16}, {name: "Chris Gotterup", salary: 16}, {name: "Patrick Reed", salary: 16}, 
      {name: "Viktor Hovland", salary: 15}, {name: "Russell Henley", salary: 15}, {name: "Si Woo Kim", salary: 14}, 
      {name: "Justin Thomas", salary: 13}, {name: "Akshay Bhatia", salary: 12}, {name: "Patrick Cantlay", salary: 12}, 
      {name: "Adam Scott", salary: 11}, {name: "Jason Day", salary: 10}, {name: "Jake Knapp", salary: 10}, 
      {name: "Shane Lowry", salary: 10}, {name: "Sam Burns", salary: 9}, {name: "J.J. Spaun", salary: 9}, 
      {name: "Cameron Smith", salary: 8}, {name: "Sepp Straka", salary: 8}, {name: "Tyrrell Hatton", salary: 8}, 
      {name: "Corey Conners", salary: 8}, {name: "Nicolai Højgaard", salary: 8}, {name: "Maverick McNealy", salary: 7}, 
      {name: "Jacob Bridgeman", salary: 7}, {name: "Sungjae Im", salary: 7}, {name: "Kurt Kitayama", salary: 6}, 
      {name: "Harris English", salary: 6}, {name: "Daniel Berger", salary: 5}, {name: "Gary Woodland", salary: 5}, 
      {name: "Ben Griffin", salary: 5}, {name: "Max Homa", salary: 5}, {name: "Rasmus Højgaard", salary: 5}, 
      {name: "Keegan Bradley", salary: 5}, {name: "Marco Penge", salary: 4}, {name: "Harry Hall", salary: 4}, 
      {name: "Alex Noren", salary: 4}, {name: "Ryan Gerard", salary: 4}, {name: "Nick Taylor", salary: 4}, 
      {name: "Ryan Fox", salary: 4}, {name: "Wyndham Clark", salary: 4}, {name: "Brian Harman", salary: 4}, 
      {name: "Michael Kim", salary: 4}, {name: "Max Greyserman", salary: 4}, {name: "Aaron Rai", salary: 4}, 
      {name: "Kristoffer Reitan", salary: 4}, {name: "Sergio García", salary: 4}, {name: "Casey Jarvis", salary: 4}, 
      {name: "Carlos Ortiz", salary: 4}, {name: "Tom McKibbin", salary: 4}, {name: "Dustin Johnson", salary: 4}, 
      {name: "Matt McCarty", salary: 4}, {name: "Haotong Li", salary: 4}, {name: "Andrew Novak", salary: 4}, 
      {name: "Nicolas Echavarria", salary: 4}, {name: "Rasmus Neergaard-Petersen", salary: 4}, {name: "Aldrich Potgieter", salary: 4}, 
      {name: "Sami Valimaki", salary: 4}, {name: "John Keefer", salary: 4}, {name: "Michael Brennan", salary: 4}, 
      {name: "Bubba Watson", salary: 4}, {name: "Zach Johnson", salary: 4}, {name: "Charl Schwartzel", salary: 4}, 
      {name: "Davis Riley", salary: 4}, {name: "Brian Campbell", salary: 4}, {name: "Danny Willett", salary: 4}, 
      {name: "Mason Howell", salary: 4}, {name: "Ethan Fang", salary: 4}, {name: "Ángel Cabrera", salary: 4}, 
      {name: "Fifa Laopakdee", salary: 4}, {name: "Naoyuki Kataoka", salary: 4}, {name: "Brandon Holtz", salary: 4}, 
      {name: "Vijay Singh", salary: 4}, {name: "Fred Couples", salary: 4}, {name: "Mike Weir", salary: 4}, 
      {name: "Mateo Pulcini", salary: 4}, {name: "Jackson Herrington", salary: 4}, {name: "José María Olazábal", salary: 4},
      {name: "Samuel Stevens", salary: 4}
    ].sort((a, b) => b.salary - a.salary || a.name.localeCompare(b.name));

    const picked = new Map();
    const golfersListEl = document.getElementById("golfersList");
    const pickedListEl = document.getElementById("pickedList");
    const searchInputEl = document.getElementById("searchInput");
    const spentValueEl = document.getElementById("spentValue");
    const remainingValueEl = document.getElementById("remainingValue");
    const pickedCountEl = document.getElementById("pickedCount");
    const messageEl = document.getElementById("message");
    const entryNameEl = document.getElementById("entryName");
    const entryEmailEl = document.getElementById("entryEmail");

    function renderAll() {
      const query = searchInputEl.value.toLowerCase();
      golfersListEl.innerHTML = "";
      golfers.filter(g => g.name.toLowerCase().includes(query)).forEach(g => {
        const row = document.createElement("div");
        row.className = "golfer-row";
        const isPicked = picked.has(g.name);
        row.innerHTML = `<div><b>${g.name}</b></div><div>$${g.salary}</div><button class="${isPicked?'remove':''}">${isPicked?'Remove':'Add'}</button>`;
        row.querySelector("button").onclick = () => {
          if (isPicked) picked.delete(g.name);
          else if (picked.size < 8) picked.set(g.name, g);
          renderAll();
        };
        golfersListEl.appendChild(row);
      });
      pickedListEl.innerHTML = picked.size ? "" : "<div class='muted' style='padding:10px; text-align:center;'>No golfers selected.</div>";
      let spent = 0;
      picked.forEach(g => {
        spent += g.salary;
        const item = document.createElement("div");
        item.className = "picked-item";
        item.innerHTML = `<div>${g.name}</div><div>$${g.salary}</div><button class="remove">×</button>`;
        item.querySelector("button").onclick = () => { picked.delete(g.name); renderAll(); };
        pickedListEl.appendChild(item);
      });
      spentValueEl.textContent = "$" + spent;
      remainingValueEl.textContent = "$" + (BUDGET - spent);
      remainingValueEl.style.color = (BUDGET - spent) < 0 ? "var(--danger)" : "";
      pickedCountEl.textContent = picked.size;
    }

    searchInputEl.oninput = renderAll;
    renderAll();

    document.getElementById("submitBtn").onclick = async () => {
      const spent = Array.from(picked.values()).reduce((s, g) => s + g.salary, 0);
      if (!entryNameEl.value || !entryEmailEl.value) { messageEl.innerText = "Name and Email are required!"; messageEl.style.color = "var(--danger)"; return; }
      if (picked.size < 4) { messageEl.innerText = "Pick at least 4 golfers!"; messageEl.style.color = "var(--danger)"; return; }
      if (spent > BUDGET) { messageEl.innerText = "You are over budget!"; messageEl.style.color = "var(--danger)"; return; }
      
      messageEl.innerText = "Submitting...";
      messageEl.style.color = "var(--text)";
      try {
        await fetch(APPS_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ name: entryNameEl.value, email: entryEmailEl.value, golfers: Array.from(picked.keys()) })});
        messageEl.innerText = "Success! Good luck at Augusta.";
        messageEl.style.color = "var(--success)";
        picked.clear(); entryNameEl.value = ""; entryEmailEl.value = ""; renderAll();
      } catch (e) { messageEl.innerText = "Error submitting."; messageEl.style.color = "var(--danger)"; }
    };
  </script>
</body>
</html>
